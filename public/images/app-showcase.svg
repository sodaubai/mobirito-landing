<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 500" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="300" y2="500">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="60%" stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#C74A1B"/>
    </linearGradient>
  </defs>
  <rect width="300" height="500" fill="url(#bg3)"/>
  <!-- Phone -->
  <rect x="50" y="30" width="200" height="420" rx="24" fill="#111" stroke="#333" stroke-width="2"/>
  <rect x="62" y="52" width="176" height="376" rx="4" fill="#0a0a1a"/>
  <!-- Status bar -->
  <text x="76" y="68" fill="rgba(255,255,255,0.5)" font-size="9" font-family="sans-serif">9:41</text>
  <g transform="translate(200, 60)">
    <rect width="18" height="8" rx="2" fill="rgba(255,255,255,0.3)"/>
    <rect width="12" height="8" rx="2" fill="#4ade80"/>
  </g>
  <!-- Map area -->
  <rect x="62" y="76" width="176" height="260" fill="#0f1729"/>
  <!-- Roads on map -->
  <g stroke="rgba(255,255,255,0.15)" stroke-width="2">
    <line x1="62" y1="140" x2="238" y2="140"/>
    <line x1="62" y1="200" x2="238" y2="200"/>
    <line x1="62" y1="260" x2="238" y2="260"/>
    <line x1="110" y1="76" x2="110" y2="336"/>
    <line x1="150" y1="76" x2="150" y2="336"/>
    <line x1="190" y1="76" x2="190" y2="336"/>
  </g>
  <!-- Route -->
  <path d="M90 320 L90 200 L150 200 L150 120 L210 120" stroke="#F15A22" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Current location dot -->
  <circle cx="90" cy="320" r="8" fill="#F15A22" opacity="0.3"/>
  <circle cx="90" cy="320" r="4" fill="#F15A22"/>
  <!-- Destination -->
  <circle cx="210" cy="120" r="6" fill="#F15A22"/>
  <circle cx="210" cy="120" r="10" fill="none" stroke="#F15A22" stroke-width="1" opacity="0.5"/>
  <!-- Bottom panel -->
  <rect x="62" y="340" width="176" height="88" fill="#111"/>
  <!-- Turn instruction -->
  <rect x="72" y="350" width="36" height="36" rx="8" fill="#F15A22"/>
  <path d="M82 374 L90 362 L98 374" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="118" y="364" fill="#fff" font-size="11" font-family="sans-serif" font-weight="700">Rẽ phải 200m</text>
  <text x="118" y="378" fill="rgba(255,255,255,0.5)" font-size="9" font-family="sans-serif">Quốc lộ 246</text>
  <!-- Speed + ETA -->
  <rect x="72" y="396" width="60" height="24" rx="12" fill="rgba(255,255,255,0.1)"/>
  <text x="102" y="412" text-anchor="middle" fill="#fff" font-size="10" font-family="sans-serif" font-weight="600">40 km/h</text>
  <rect x="142" y="396" width="86" height="24" rx="12" fill="rgba(241,90,34,0.2)"/>
  <text x="185" y="412" text-anchor="middle" fill="#F15A22" font-size="10" font-family="sans-serif" font-weight="600">ETA 15 phút</text>
  <!-- Navinext logo small -->
  <text x="150" y="460" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10" font-family="sans-serif" font-weight="600">navinext</text>
</svg>
