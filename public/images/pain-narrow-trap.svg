<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#16213e"/></linearGradient>
  </defs>
  <rect width="280" height="200" rx="16" fill="url(#bg3)"/>
  <!-- Narrow alley walls -->
  <rect x="90" y="30" width="12" height="140" fill="#444" rx="2"/>
  <rect x="178" y="30" width="12" height="140" fill="#444" rx="2"/>
  <!-- Alley floor -->
  <rect x="102" y="30" width="76" height="140" fill="#333" rx="0"/>
  <!-- Car stuck in alley -->
  <rect x="112" y="90" width="56" height="30" rx="6" fill="#F15A22" opacity="0.9"/>
  <rect x="116" y="95" width="20" height="12" rx="2" fill="#fff" opacity="0.3"/>
  <rect x="144" y="95" width="20" height="12" rx="2" fill="#fff" opacity="0.3"/>
  <!-- Width markers -->
  <line x1="95" y1="180" x2="185" y2="180" stroke="#F15A22" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="140" y="195" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#F15A22">1.8m</text>
  <!-- Arrows showing stuck -->
  <path d="M140 85 L140 75 L135 80 M140 75 L145 80" stroke="#F15A22" stroke-width="1.5" fill="none"/>
  <path d="M140 125 L140 135 L135 130 M140 135 L145 130" stroke="#F15A22" stroke-width="1.5" fill="none"/>
  <!-- X marks (can't move) -->
  <text x="65" y="110" font-family="sans-serif" font-size="20" font-weight="bold" fill="#F15A22" opacity="0.5">✕</text>
  <text x="200" y="110" font-family="sans-serif" font-size="20" font-weight="bold" fill="#F15A22" opacity="0.5">✕</text>
</svg>
