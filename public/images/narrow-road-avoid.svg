<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="480" y2="360">
      <stop offset="0%" stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#2C2C2C"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F15A22"/>
      <stop offset="100%" stop-color="#C74A1B"/>
    </linearGradient>
  </defs>
  <rect width="480" height="360" rx="24" fill="url(#bg1)"/>
  <!-- Map grid -->
  <g opacity="0.15" stroke="#fff" stroke-width="1">
    <line x1="80" y1="40" x2="80" y2="320"/><line x1="160" y1="40" x2="160" y2="320"/>
    <line x1="240" y1="40" x2="240" y2="320"/><line x1="320" y1="40" x2="320" y2="320"/>
    <line x1="400" y1="40" x2="400" y2="320"/>
    <line x1="40" y1="80" x2="440" y2="80"/><line x1="40" y1="160" x2="440" y2="160"/>
    <line x1="40" y1="240" x2="440" y2="240"/>
  </g>
  <!-- Main road (wide, safe) -->
  <rect x="60" y="140" width="360" height="40" rx="4" fill="#3a3a3a"/>
  <rect x="200" y="60" width="40" height="240" rx="4" fill="#3a3a3a"/>
  <!-- Narrow alley (danger) -->
  <rect x="320" y="180" width="12" height="100" rx="2" fill="#3a3a3a" opacity="0.6"/>
  <!-- Red X on narrow road -->
  <circle cx="326" cy="220" r="16" fill="#ff4444" opacity="0.3"/>
  <g stroke="#ff4444" stroke-width="3" stroke-linecap="round">
    <line x1="318" y1="212" x2="334" y2="228"/><line x1="334" y1="212" x2="318" y2="228"/>
  </g>
  <text x="326" y="252" text-anchor="middle" fill="#ff4444" font-size="9" font-family="sans-serif" font-weight="600">1.8m</text>
  <!-- Safe route highlighted -->
  <path d="M80 160 L200 160 L200 100 L220 100 L220 160 L400 160" stroke="url(#route)" stroke-width="6" stroke-linecap="round" fill="none" stroke-dasharray="0"/>
  <!-- Car icon on route -->
  <g transform="translate(280, 148)">
    <rect width="24" height="14" rx="4" fill="#F15A22"/>
    <rect x="2" y="-3" width="8" height="6" rx="2" fill="#F15A22"/>
    <rect x="14" y="-3" width="8" height="6" rx="2" fill="#F15A22"/>
    <circle cx="6" cy="16" r="3" fill="#fff"/>
    <circle cx="18" cy="16" r="3" fill="#fff"/>
  </g>
  <!-- Route dot markers -->
  <circle cx="80" cy="160" r="6" fill="#F15A22"/><circle cx="400" cy="160" r="6" fill="#F15A22" opacity="0.5"/>
  <!-- Label -->
  <rect x="100" y="70" width="80" height="24" rx="12" fill="#F15A22"/>
  <text x="140" y="86" text-anchor="middle" fill="#fff" font-size="10" font-family="sans-serif" font-weight="600">An toàn</text>
  <!-- Warning label on narrow -->
  <rect x="340" y="200" width="60" height="20" rx="10" fill="#ff4444" opacity="0.2"/>
  <text x="370" y="214" text-anchor="middle" fill="#ff4444" font-size="8" font-family="sans-serif" font-weight="600">Ngõ hẹp</text>
  <!-- Checkmark -->
  <circle cx="420" cy="80" r="20" fill="#F15A22" opacity="0.2"/>
  <path d="M410 80 L417 87 L430 73" stroke="#F15A22" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
