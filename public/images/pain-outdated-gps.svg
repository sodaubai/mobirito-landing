<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#16213e"/></linearGradient>
  </defs>
  <rect width="280" height="200" rx="16" fill="url(#bg4)"/>
  <!-- Old GPS device -->
  <rect x="85" y="35" width="110" height="85" rx="8" fill="#2a2a2a" stroke="#444" stroke-width="2"/>
  <rect x="92" y="42" width="96" height="62" rx="4" fill="#1a3a1a"/>
  <!-- Pixelated old map on screen -->
  <line x1="100" y1="55" x2="160" y2="55" stroke="#2a5a2a" stroke-width="3"/>
  <line x1="120" y1="45" x2="120" y2="100" stroke="#2a5a2a" stroke-width="3"/>
  <line x1="145" y1="50" x2="145" y2="90" stroke="#2a5a2a" stroke-width="2"/>
  <line x1="100" y1="75" x2="180" y2="75" stroke="#2a5a2a" stroke-width="2"/>
  <!-- Japanese text on device -->
  <text x="140" y="68" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4a8a4a">目的地</text>
  <text x="140" y="95" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4a8a4a">設定</text>
  <!-- Buttons -->
  <circle cx="110" cy="128" r="4" fill="#444"/>
  <circle cx="140" cy="128" r="4" fill="#444"/>
  <circle cx="170" cy="128" r="4" fill="#444"/>
  <!-- Outdated stamp -->
  <rect x="150" y="100" width="70" height="24" rx="4" fill="#F15A22" opacity="0.9" transform="rotate(-15 185 112)"/>
  <text x="185" y="116" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#fff" transform="rotate(-15 185 112)">OUTDATED</text>
  <!-- Money flying away -->
  <text x="60" y="160" font-family="sans-serif" font-size="14" fill="#F15A22" opacity="0.6">¥</text>
  <text x="200" y="150" font-family="sans-serif" font-size="16" fill="#F15A22" opacity="0.5">¥</text>
  <text x="220" y="170" font-family="sans-serif" font-size="12" fill="#F15A22" opacity="0.4">¥</text>
</svg>
