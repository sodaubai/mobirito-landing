<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#16213e"/></linearGradient>
  </defs>
  <rect width="280" height="200" rx="16" fill="url(#bg2)"/>
  <!-- Multi-level interchange roads -->
  <path d="M20 160 Q70 120 140 100 Q210 80 260 40" stroke="#555" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M20 160 Q70 120 140 100 Q210 80 260 40" stroke="#666" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M20 80 Q80 100 140 100 Q200 100 260 130" stroke="#444" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M20 80 Q80 100 140 100 Q200 100 260 130" stroke="#555" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Road markings -->
