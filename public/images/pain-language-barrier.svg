<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#16213e"/></linearGradient>
  </defs>
  <rect width="280" height="200" rx="16" fill="url(#bg1)"/>
  <!-- Road sign post -->
  <rect x="125" y="40" width="8" height="100" rx="2" fill="#555"/>
  <!-- Sign board -->
  <rect x="70" y="30" width="140" height="55" rx="8" fill="#fff" opacity="0.95"/>
  <rect x="70" y="30" width="140" height="55" rx="8" fill="none" stroke="#ddd" stroke-width="1"/>
  <!-- Japanese text on sign -->
  <text x="140" y="52" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">一方通行</text>
  <text x="140" y="72" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">駐車禁止</text>
  <!-- Confused driver icon -->
  <circle cx="140" cy="145" r="18" fill="#F15A22" opacity="0.2"/>
  <circle cx="140" cy="138" r="8" fill="none" stroke="#F15A22" stroke-width="2"/>
  <path d="M132 152 C132 146 148 146 148 152" fill="none" stroke="#F15A22" stroke-width="2"/>
  <!-- Question marks -->
  <text x="110" y="140" font-family="sans-serif" font-size="16" font-weight="bold" fill="#F15A22" opacity="0.7">?</text>
  <text x="165" y="135" font-family="sans-serif" font-size="20" font-weight="bold" fill="#F15A22" opacity="0.5">?</text>
  <text x="100" y="155" font-family="sans-serif" font-size="12" font-weight="bold" fill="#F15A22" opacity="0.4">?</text>
</svg>
